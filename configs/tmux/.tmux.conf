# ============================================================
# 鼠标 & 滚轮
# ============================================================
set -g mouse on

# 滚轮进入 copy-mode（每次 3 行）
bind -n WheelUpPane   if-shell -F "#{alternate_on}" "send-keys -M" "select-pane -t=; copy-mode -e; send-keys -X -N 3 scroll-up"
bind -T copy-mode-vi WheelUpPane   send-keys -X -N 3 scroll-up
bind -T copy-mode-vi WheelDownPane send-keys -X -N 3 scroll-down

# 鼠标选中自动复制（通过 OSC 52 传到本地剪贴板）
bind -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-selection-and-cancel

# 双击选词，三击选行
bind -n DoubleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-word \; send-keys -X copy-selection-and-cancel
bind -n TripleClick1Pane select-pane -t = \; copy-mode -H \; send-keys -X select-line \; send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi DoubleClick1Pane send-keys -X select-word \; send-keys -X copy-selection-and-cancel
bind -T copy-mode-vi TripleClick1Pane send-keys -X select-line \; send-keys -X copy-selection-and-cancel

# 右键粘贴
bind -n MouseDown3Pane paste-buffer

# ============================================================
# 基础设置
# ============================================================
# 256色 + true color
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc"

# OSC 52 剪贴板（SSH 远程复制到本地）
set -g set-clipboard on

# vi 模式（copy-mode 用 vi 键位）
setw -g mode-keys vi

# 让 Vim/Neovim 感知焦点切换（自动重载文件等）
set -g focus-events on

# 减少 escape 延迟（对 vim/neovim 友好）
set -sg escape-time 10

# 历史缓冲区加大
set -g history-limit 50000

# 多客户端时窗口大小取当前客户端而非全局最小
setw -g aggressive-resize on

# 窗口/面板编号从 1 开始（方便左手够到）
set -g base-index 1
setw -g pane-base-index 1

# 关闭窗口后自动重排编号
set -g renumber-windows on

# 活动窗口监控
setw -g monitor-activity on
set -g visual-activity off

# ============================================================
# 快捷键
# ============================================================
# prefix 改为 Ctrl-a（比 Ctrl-b 顺手）
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# 分屏：| 竖分，- 横分（比 % 和 " 直观）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"

# 新窗口保持当前路径
bind c new-window -c "#{pane_current_path}"

# prefix + r 重新加载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded"

# Alt+方向键 切换面板（无需 prefix）
bind -n M-Left  select-pane -L
bind -n M-Right select-pane -R
bind -n M-Up    select-pane -U
bind -n M-Down  select-pane -D

# Shift+方向键 调整面板大小
bind -n S-Left  resize-pane -L 2
bind -n S-Right resize-pane -R 2
bind -n S-Up    resize-pane -U 1
bind -n S-Down  resize-pane -D 1

# ============================================================
# 状态栏
# ============================================================
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[default] "
set -g status-left-length 20
set -g status-right "#[fg=colour248] %m/%d %H:%M "
setw -g window-status-current-style "fg=colour232,bg=colour39,bold"
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# 面板边框
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
